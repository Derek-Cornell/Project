data_path: data/electricity/electricity.csv
seq_len: 336
pred_len: 720

model: patchtst
patch_len: 16
stride: 8
d_model: 128
n_heads: 16
n_layers: 3
d_ff: 256
dropout: 0.2
head_dropout: 0.0
revin: true

batch_size: 32
lr: 1.0e-4
epochs: 100
patience: 10
lr_schedule: type1
num_workers: 4
seed: 2021

run_name: patchtst_electricity_720
results_dir: results
checkpoint_dir: results/checkpoints
