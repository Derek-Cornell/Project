data_path: data/electricity/electricity.csv
seq_len: 336
pred_len: 192

model: patchtst
patch_len: 16
stride: 8
d_model: 128
n_heads: 16
n_layers: 3
d_ff: 256
dropout: 0.2
attn_dropout: 0.0
head_dropout: 0.0
revin: true
affine: false
res_attention: true

batch_size: 32
lr: 1.0e-4
epochs: 100
patience: 10
lr_schedule: TST
pct_start: 0.2
num_workers: 4
seed: 2021

run_name: patchtst_electricity_192
results_dir: results
checkpoint_dir: results/checkpoints
